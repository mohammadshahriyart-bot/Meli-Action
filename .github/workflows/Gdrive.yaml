name: Download from Google Drive and Upload as Split ZIP

on:
  workflow_dispatch:
    inputs:
      google_drive_url:
        description: 'Google Drive URL or File ID'
        required: true
        type: string
      filename:
        description: 'Output file name (optional)'
        required: false
        type: string
        default: ''

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # ✅ Permission to create a release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python and install gdown
        run: |
          python -m pip install --upgrade pip
          pip install gdown

      - name: Download file from Google Drive
        id: download
        run: |
          URL="${{ github.event.inputs.google_drive_url }}"
          OUTPUT_NAME="${{ github.event.inputs.filename }}"

          if [ -z "$OUTPUT_NAME" ]; then
            # Let gdown auto-detect the filename
            gdown "$URL"
          else
            gdown "$URL" -O "$OUTPUT_NAME"
          fi

          # Find the downloaded file (most recent file that isn't the script itself)
          DOWNLOADED_FILE=$(ls -t | grep -v -E '\.sh$|\.yml$' | head -1)
          echo "FILE_NAME=$DOWNLOADED_FILE" >> $GITHUB_ENV
          echo "Downloaded: $DOWNLOADED_FILE"

      - name: Split into 50MB ZIP parts
        run: |
          if [ ! -f "${{ env.FILE_NAME }}" ]; then
            echo "Error: File not found!"
            exit 1
          fi
          zip -s 50m -r split_archive.zip "${{ env.FILE_NAME }}"
          echo "Split ZIP parts created:"
          ls -la split_archive.z* split_archive.zip 2>/dev/null || true

      - name: Upload all parts to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            split_archive.z*
            split_archive.zip
          tag_name: google-drive-split-${{ github.run_id }}
          name: Google Drive Split Download ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}